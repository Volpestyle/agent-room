room:
  id: my-project
  name: My Project

runtime:
  default: local-runtime

runtimes:
  local-runtime:
    type: tmux
    sessionPrefix: my-project
    cli: tmux
  herdr-example:
    type: herdr
    session: my-project
    cli: herdr
  fake:
    type: fake

storage:
  driver: jsonl
  path: .agentroom/events.jsonl

room:
  id: my-project
  name: My Project

runtime:
  default: herdr

runtimes:
  herdr:
    type: herdr
    session: my-project
    cli: herdr
  tmux:
    type: tmux
    sessionPrefix: agentroom
    cli: tmux
  fake:
    type: fake

storage:
  driver: jsonl
  path: .agentroom/events.jsonl

channels:
  - announcements
  - planning
  - implementation
  - review
  - human
  - scratch

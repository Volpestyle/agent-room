room:
  id: my-project
  name: My Project

runtime:
  # Choose one configured runtime id for this room.
  default: local-runtime

runtimes:
  # Example tmux runtime. Replace with Herdr, fake, or a custom adapter if that
  # is the runtime you chose for the room.
  local-runtime:
    type: tmux
    sessionPrefix: my-project
    cli: tmux
  herdr-example:
    type: herdr
    session: my-project
    cli: herdr
  fake:
    type: fake

storage:
  driver: jsonl
  path: .agentroom/events.jsonl

channels:
  - announcements
  - planning
  - implementation
  - review
  - human
  - scratch

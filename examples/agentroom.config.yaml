room:
  id: my-project
  name: My Project

runtime:
  default: local-runtime

workTracker:
  default: linear
  providers:
    linear:
      type: linear

clanky:
  home: .clanky-room
  profile: lead
  chatGatewayOwner: room

runtimes:
  local-runtime:
    type: tmux
    sessionPrefix: my-project
    cli: tmux
  herdr-example:
    type: herdr
    session: my-project
    cli: herdr
  fake:
    type: fake

storage:
  driver: jsonl
  path: events.jsonl

name: Docs Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/docs-pages.yml"
      - "apps/docs/**"
      - "docs/**"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  workflow_dispatch:

jobs:
  docs-pages:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: Volpestyle/docs/.github/workflows/docs-pages.yml@main
    with:
      docs-base-path: /agent-room/
